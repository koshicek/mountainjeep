<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeep Mountain Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}
#ui-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  pointer-events: none;
  z-index: 10;
}
#ui-overlay.hidden { display: none; }
#ui-overlay h1 {
  font-size: 48px;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
  margin-bottom: 10px;
}
#ui-overlay h2 {
  font-size: 28px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
  margin-bottom: 20px;
  color: #ffd700;
}
#ui-overlay p {
  font-size: 18px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
  margin-bottom: 8px;
}
#ui-overlay .start-hint {
  font-size: 22px;
  margin-top: 30px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
#hud {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 30px;
  color: white;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
  z-index: 5;
}
#hud.hidden { display: none; }
#hud span { background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px; }
</style>
</head>
<body>

<canvas id="game" width="900" height="580"></canvas>

<div id="hud" class="hidden">
  <span id="hud-lives"></span>
  <span id="hud-score">Vzdálenost: 0 m</span>
  <span id="hud-speed">Rychlost: 60 km/h</span>
  <span id="hud-level">Úroveň: 1</span>
</div>

<div id="ui-overlay">
  <h1>🏔️ Jeep Mountain Run</h1>
  <h2>Terénní dobrodružství</h2>
  <p>⬆️ Skok &nbsp; ⬅️➡️ Přepínání pruhů &nbsp; ⬇️ Turbo</p>
  <p class="start-hint">Stiskni ENTER pro start</p>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('ui-overlay');
const hud = document.getElementById('hud');
const hudLives = document.getElementById('hud-lives');
const hudScore = document.getElementById('hud-score');
const hudSpeed = document.getElementById('hud-speed');
const hudLevel = document.getElementById('hud-level');

// ============ AUDIO SYSTEM ============
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let audioStarted = false;
let engineOsc = null;
let engineGain = null;
let musicNodes = [];
let musicPlaying = false;

function initAudio() {
  if (audioStarted) return;
  audioCtx = new AudioCtx();
  audioStarted = true;
  startEngine();
  startMusic();
}

function startEngine() {
  if (!audioCtx) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  const engineFilter = audioCtx.createBiquadFilter();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  engineGain.gain.value = 0.06;
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 300;
  const rumbleOsc = audioCtx.createOscillator();
  const rumbleGain = audioCtx.createGain();
  rumbleOsc.type = 'triangle';
  rumbleOsc.frequency.value = 40;
  rumbleGain.gain.value = 0.04;
  engineOsc.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(audioCtx.destination);
  rumbleOsc.connect(rumbleGain);
  rumbleGain.connect(audioCtx.destination);
  engineOsc.start();
  rumbleOsc.start();
  musicNodes.push(engineOsc, rumbleOsc);
}

function updateEngineSound() {
  if (!engineOsc || !audioCtx) return;
  const pitch = 60 + speed * 15;
  engineOsc.frequency.setTargetAtTime(pitch, audioCtx.currentTime, 0.1);
  engineGain.gain.setTargetAtTime(0.03 + speed * 0.008, audioCtx.currentTime, 0.1);
}

function stopEngine() {
  if (!audioCtx) return;
  musicNodes.forEach(node => {
    try { node.stop(audioCtx.currentTime + 0.1); } catch(e) {}
  });
  musicNodes = [];
  engineOsc = null;
  engineGain = null;
}

function playCrashSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufferSize = audioCtx.sampleRate * 0.25;
  const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = noiseBuffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuffer;
  const noiseGain = audioCtx.createGain();
  noiseGain.gain.value = 0.2;
  noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.value = 800;
  noiseFilter.Q.value = 1;
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.25);
  const thud = audioCtx.createOscillator();
  const thudGain = audioCtx.createGain();
  thud.type = 'sine';
  thud.frequency.value = 80;
  thud.frequency.exponentialRampToValueAtTime(30, t + 0.2);
  thudGain.gain.value = 0.25;
  thudGain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  thud.connect(thudGain);
  thudGain.connect(audioCtx.destination);
  thud.start(t);
  thud.stop(t + 0.2);
  const clang = audioCtx.createOscillator();
  const clangGain = audioCtx.createGain();
  clang.type = 'square';
  clang.frequency.value = 300;
  clang.frequency.exponentialRampToValueAtTime(100, t + 0.15);
  clangGain.gain.value = 0.12;
  clangGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
  clang.connect(clangGain);
  clangGain.connect(audioCtx.destination);
  clang.start(t);
  clang.stop(t + 0.15);
}

function playJumpSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 200;
  osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
  gain.gain.value = 0.08;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

function playLaneSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 400;
  gain.gain.value = 0.05;
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.08);
}

let turboSoundPlaying = false;
let turboOsc = null;
let turboGain = null;
function startTurboSound() {
  if (!audioCtx || turboSoundPlaying) return;
  turboSoundPlaying = true;
  turboOsc = audioCtx.createOscillator();
  turboGain = audioCtx.createGain();
  turboOsc.type = 'sawtooth';
  turboOsc.frequency.value = 180;
  turboGain.gain.value = 0.07;
  turboOsc.connect(turboGain);
  turboGain.connect(audioCtx.destination);
  turboOsc.start();
}
function stopTurboSound() {
  if (!turboSoundPlaying || !turboOsc) return;
  turboGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  turboOsc.stop(audioCtx.currentTime + 0.12);
  turboSoundPlaying = false;
  turboOsc = null;
  turboGain = null;
}

function playGameOverSound() {
  if (!audioCtx) return;
  const notes = [300, 250, 200, 120];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    gain.gain.value = 0.1;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2 + i * 0.15);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * 0.15);
    osc.stop(audioCtx.currentTime + 0.3 + i * 0.15);
  });
}

let musicInterval = null;
function startMusic() {
  if (!audioCtx || musicPlaying) return;
  musicPlaying = true;
  const melodyNotes = [262, 294, 330, 349, 392, 349, 330, 294];
  const bassNotes =   [131, 131, 165, 165, 196, 196, 165, 165];
  let noteIndex = 0;
  function playNote() {
    if (!audioCtx || state === STATE.GAMEOVER) return;
    const mel = audioCtx.createOscillator();
    const melGain = audioCtx.createGain();
    mel.type = 'triangle';
    mel.frequency.value = melodyNotes[noteIndex % melodyNotes.length];
    melGain.gain.value = 0.04;
    melGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    mel.connect(melGain);
    melGain.connect(audioCtx.destination);
    mel.start();
    mel.stop(audioCtx.currentTime + 0.28);
    const bass = audioCtx.createOscillator();
    const bassGain = audioCtx.createGain();
    bass.type = 'sine';
    bass.frequency.value = bassNotes[noteIndex % bassNotes.length];
    bassGain.gain.value = 0.05;
    bassGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    bass.connect(bassGain);
    bassGain.connect(audioCtx.destination);
    bass.start();
    bass.stop(audioCtx.currentTime + 0.32);
    noteIndex++;
  }
  musicInterval = setInterval(playNote, 320);
}

function stopMusic() {
  musicPlaying = false;
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

// ============ GAME STATE ============
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let speed = 3;
let baseSpeed = 3;
let level = 1;
let frameCount = 0;
let lastObstacleX = 900;
let shakeTimer = 0;
let shakeIntensity = 0;
let particles = [];
let dustParticles = [];
let splashParticles = [];
let currentTheme = 'mountain';

// Keys
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Enter') {
    if (state === STATE.MENU || state === STATE.GAMEOVER) startGame();
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key] = false);

// ============ THEME SYSTEM ============
function getTheme() {
  if (level <= 5) return 'mountain';
  if (level <= 10) return 'city';
  if (level <= 15) return 'desert';
  if (level <= 20) return 'ocean';
  if (level <= 25) return 'swamp';
  return 'racetrack';
}

const THEMES = {
  mountain: {
    sky: ['#87CEEB', '#B0E0E6', '#E0F0E0'],
    farMountain: '#7B9EA8',
    nearMountain: '#5A7A5A',
    snowCap: '#E8E8E8',
    roadEdge: '#FFA500',
    belowRoad: ['#4A3728', '#2D1F14'],
    laneColors: ['rgba(85,85,85,1)', 'rgba(75,75,75,1)', 'rgba(65,65,65,1)'],
    cloudColor: 'rgba(255,255,255,0.8)',
  },
  city: {
    sky: ['#6B7B8D', '#8899AA', '#C0C8D0'],
    farMountain: '#4A4A5A',
    nearMountain: '#3A3A4A',
    roadEdge: '#FFD700',
    belowRoad: ['#555555', '#333333'],
    laneColors: ['rgba(70,70,70,1)', 'rgba(60,60,60,1)', 'rgba(50,50,50,1)'],
    cloudColor: 'rgba(200,200,210,0.6)',
  },
  desert: {
    sky: ['#FF9933', '#FFB366', '#FFDD99'],
    farMountain: '#C2956B',
    nearMountain: '#A87D50',
    roadEdge: '#CC8833',
    belowRoad: ['#D4A45A', '#B8883A'],
    laneColors: ['rgba(160,130,80,1)', 'rgba(145,115,70,1)', 'rgba(130,100,60,1)'],
    cloudColor: 'rgba(255,255,240,0.4)',
  },
  ocean: {
    sky: ['#1a5276', '#2980b9', '#5dade2'],
    farMountain: '#1a6e8e',
    nearMountain: '#1a8eae',
    roadEdge: '#FFFFFF',
    belowRoad: ['#0a3d5c', '#06263a'],
    laneColors: ['rgba(30,90,140,1)', 'rgba(25,80,130,1)', 'rgba(20,70,120,1)'],
    cloudColor: 'rgba(255,255,255,0.7)',
  },
  swamp: {
    sky: ['#2d4a1e', '#3d5a2e', '#5a7a3e'],
    farMountain: '#3a4a2a',
    nearMountain: '#2a3a1a',
    roadEdge: '#5a6a3a',
    belowRoad: ['#2a3a1a', '#1a2a0a'],
    laneColors: ['rgba(60,75,40,1)', 'rgba(50,65,35,1)', 'rgba(45,55,30,1)'],
    cloudColor: 'rgba(150,170,130,0.4)',
  },
  racetrack: {
    sky: ['#4a90d9', '#6ab0f0', '#c0e0ff'],
    farMountain: '#889988',
    nearMountain: '#778877',
    roadEdge: '#FF0000',
    belowRoad: ['#228B22', '#1a6e1a'],
    laneColors: ['rgba(55,55,55,1)', 'rgba(50,50,50,1)', 'rgba(45,45,45,1)'],
    cloudColor: 'rgba(255,255,255,0.8)',
  },
};

// Jeep
const jeep = {
  x: 150, y: 0, w: 70, h: 45,
  vy: 0, grounded: true,
  groundY: 0,
  lane: 1,
  lives: 3, maxLives: 3,
  invincible: 0,
  inWater: false,
  onMud: false,
  onIce: false,
  onSlippery: false,
  turbo: false,
  turboFuel: 100,
  tilt: 0,
  wheelAngle: 0,
  laneKeyHeld: false,
};

// Road & terrain
const ROAD_Y = 330;
const ROAD_H = 198;
const LANE_H = ROAD_H / 3;
const LANE_HIGHLIGHT = 'rgba(255, 215, 0, 0.15)';

// Parallax layers
let mountains1 = [];
let mountains2 = [];
let clouds = [];
let trees = [];
let bgElements = []; // theme-specific background elements

function initMountains() {
  mountains1 = [];
  mountains2 = [];
  clouds = [];
  trees = [];
  bgElements = [];
  for (let i = 0; i < 8; i++) {
    mountains1.push({ x: i * 200 - 100, w: 250, h: 100 + Math.random() * 80 });
    mountains2.push({ x: i * 160 - 50, w: 200, h: 60 + Math.random() * 50 });
  }
  for (let i = 0; i < 6; i++) {
    clouds.push({ x: Math.random() * 900, y: 30 + Math.random() * 60, w: 60 + Math.random() * 40 });
  }
  for (let i = 0; i < 12; i++) {
    trees.push({ x: Math.random() * 1000, h: 30 + Math.random() * 25, type: Math.floor(Math.random() * 3) });
  }
  for (let i = 0; i < 8; i++) {
    bgElements.push({ x: Math.random() * 1000, h: 20 + Math.random() * 30, type: Math.floor(Math.random() * 3) });
  }
}

// Obstacles
let obstacles = [];
const OBSTACLE_TYPES = {
  ROCK: { name: 'Kámen', color: '#666', minLevel: 1, lanes: [0,1,2], w: 35, h: 30 },
  LOG: { name: 'Kláda', color: '#8B4513', minLevel: 1, lanes: [0,1,2], w: 60, h: 20 },
  WATER: { name: 'Brod', color: '#3498db', minLevel: 2, lanes: [0,1,2], w: 120, h: ROAD_H, fullWidth: true },
  MUD: { name: 'Bláto', color: '#8B6914', minLevel: 2, lanes: [0,1,2], w: 100, h: ROAD_H, fullWidth: true },
  GAP: { name: 'Propast', color: '#1a1a2e', minLevel: 3, lanes: [0,1,2], w: 55, h: ROAD_H, fullWidth: true, deadly: true },
  ICE: { name: 'Led', color: '#a8d8ea', minLevel: 3, lanes: [0,1,2], w: 110, h: ROAD_H, fullWidth: true },
  BOULDER: { name: 'Balvan', color: '#555', minLevel: 4, lanes: [0,1,2], w: 45, h: 40 },
  FALLEN_TREE: { name: 'Padlý strom', color: '#5D4037', minLevel: 4, lanes: [0,1], w: 80, h: 55, tall: true },
  RAMP: { name: 'Rampa', color: '#FF8C00', minLevel: 2, lanes: [1], w: 50, h: 25, isRamp: true },
  MELTED_LOLLY: { name: 'Rozlitá zmrzka', color: '#FF69B4', minLevel: 2, lanes: [0,1,2], w: 50, h: 25, slippery: true },
  SMOOTHIE: { name: 'Rozlitý smoothie', color: '#9B59B6', minLevel: 3, lanes: [0,1,2], w: 55, h: 22, slippery: true },
  // City obstacles
  POTHOLE: { name: 'Výmol', color: '#333', minLevel: 6, lanes: [0,1,2], w: 40, h: 25 },
  CONE: { name: 'Kužel', color: '#FF6600', minLevel: 6, lanes: [0,1,2], w: 25, h: 35 },
  // Desert obstacles
  CACTUS: { name: 'Kaktus', color: '#2E8B57', minLevel: 11, lanes: [0,1,2], w: 30, h: 45 },
  TUMBLEWEED: { name: 'Kotrmelec', color: '#C4A35A', minLevel: 11, lanes: [0,1,2], w: 35, h: 30 },
  // Ocean obstacles (islands with palm trees)
  ISLAND: { name: 'Ostrov', color: '#D4A45A', minLevel: 16, lanes: [0,1,2], w: 70, h: 50 },
  // Swamp obstacles (bones)
  BONE_PILE: { name: 'Kosti', color: '#E8DCC8', minLevel: 21, lanes: [0,1,2], w: 50, h: 30 },
  SKULL: { name: 'Lebka', color: '#F0E6D3', minLevel: 21, lanes: [0,1,2], w: 35, h: 35 },
  // Racetrack obstacles
  TIRE_WALL: { name: 'Pneumatiky', color: '#222', minLevel: 26, lanes: [0,1,2], w: 45, h: 35 },
  OIL_SPILL: { name: 'Olej', color: '#1a1a1a', minLevel: 26, lanes: [0,1,2], w: 60, h: 20, slippery: true },
};

function getAvailableTypes() {
  const theme = currentTheme;
  return Object.entries(OBSTACLE_TYPES).filter(([key, v]) => {
    if (v.minLevel > level) return false;
    // Filter obstacles to match current theme
    if (theme === 'ocean') {
      return ['ISLAND', 'WATER', 'RAMP', 'GAP'].includes(key);
    }
    if (theme === 'swamp') {
      return ['BONE_PILE', 'SKULL', 'MUD', 'GAP', 'RAMP', 'LOG'].includes(key);
    }
    if (theme === 'racetrack') {
      return ['TIRE_WALL', 'OIL_SPILL', 'RAMP', 'CONE'].includes(key);
    }
    if (theme === 'city') {
      return ['POTHOLE', 'CONE', 'ROCK', 'RAMP', 'GAP', 'MELTED_LOLLY', 'SMOOTHIE'].includes(key);
    }
    if (theme === 'desert') {
      return ['CACTUS', 'TUMBLEWEED', 'ROCK', 'BOULDER', 'RAMP', 'GAP'].includes(key);
    }
    // mountain - original obstacles
    return v.minLevel <= 5 || ['GAP', 'BOULDER', 'FALLEN_TREE'].includes(key);
  });
}

function spawnObstacle() {
  const available = getAvailableTypes();
  if (available.length === 0) return;
  const [key, type] = available[Math.floor(Math.random() * available.length)];
  const lane = type.fullWidth ? -1 : type.lanes[Math.floor(Math.random() * type.lanes.length)];
  const y = type.fullWidth ? ROAD_Y : ROAD_Y + lane * LANE_H + (LANE_H - type.h) / 2;

  obstacles.push({
    x: 950,
    y: y,
    w: type.w,
    h: type.fullWidth ? ROAD_H : type.h,
    type: key,
    color: type.color,
    fullWidth: type.fullWidth || false,
    deadly: type.deadly || false,
    isRamp: type.isRamp || false,
    tall: type.tall || false,
    slippery: type.slippery || false,
    passed: false,
  });
}

function startGame() {
  initAudio();
  state = STATE.PLAYING;
  score = 0;
  speed = 3;
  baseSpeed = 3;
  level = 1;
  currentTheme = 'mountain';
  frameCount = 0;
  lastObstacleX = 900;
  obstacles = [];
  particles = [];
  dustParticles = [];
  splashParticles = [];
  jeep.y = ROAD_Y + LANE_H + (LANE_H - jeep.h) / 2;
  jeep.lane = 1;
  jeep.vy = 0;
  jeep.grounded = true;
  jeep.lives = 3;
  jeep.invincible = 0;
  jeep.inWater = false;
  jeep.onMud = false;
  jeep.onIce = false;
  jeep.onSlippery = false;
  jeep.turbo = false;
  jeep.turboFuel = 100;
  jeep.tilt = 0;
  jeep.laneKeyHeld = false;
  jeep.groundY = jeep.y;
  shakeTimer = 0;
  initMountains();
  overlay.classList.add('hidden');
  hud.classList.remove('hidden');
  startMusic();
}

function gameOver() {
  state = STATE.GAMEOVER;
  hud.classList.add('hidden');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>💥 Konec jízdy!</h1>
    <h2>Vzdálenost: ${score} m</h2>
    <p>Úroveň: ${level} | Rychlost: ${Math.floor(60 + (speed - 3) * 15)} km/h</p>
    <p class="start-hint">Stiskni ENTER pro novou hru</p>
  `;
  stopTurboSound();
  stopEngine();
  stopMusic();
  playGameOverSound();
}

// ============ DRAWING FUNCTIONS ============

function drawSky() {
  const theme = THEMES[currentTheme];
  const grad = ctx.createLinearGradient(0, 0, 0, ROAD_Y);
  grad.addColorStop(0, theme.sky[0]);
  grad.addColorStop(0.6, theme.sky[1]);
  grad.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 900, ROAD_Y);
}

function drawClouds() {
  const theme = THEMES[currentTheme];
  ctx.fillStyle = theme.cloudColor;
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, 15, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - 15, c.y + 5, c.w / 3, 12, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + 18, c.y + 3, c.w / 3, 10, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawMountains() {
  const theme = THEMES[currentTheme];

  if (currentTheme === 'ocean') {
    // Draw waves instead of mountains
    ctx.fillStyle = theme.farMountain;
    for (let x = 0; x < 920; x += 5) {
      const waveH = 15 + Math.sin((x + frameCount * 1.5) * 0.02) * 10;
      ctx.fillRect(x, ROAD_Y - waveH, 6, waveH);
    }
    ctx.fillStyle = theme.nearMountain;
    for (let x = 0; x < 920; x += 5) {
      const waveH = 10 + Math.sin((x + frameCount * 2.5) * 0.03) * 8;
      ctx.fillRect(x, ROAD_Y - waveH - 5, 6, waveH + 5);
    }
    return;
  }

  if (currentTheme === 'city') {
    // Draw buildings
    ctx.fillStyle = theme.farMountain;
    mountains1.forEach(m => {
      const bw = m.w * 0.4;
      const bh = m.h * 1.2;
      ctx.fillRect(m.x, ROAD_Y - bh, bw, bh);
      // Windows
      ctx.fillStyle = '#FFD700';
      for (let wy = ROAD_Y - bh + 8; wy < ROAD_Y - 10; wy += 16) {
        for (let wx = m.x + 6; wx < m.x + bw - 6; wx += 14) {
          if (Math.random() > 0.3) {
            ctx.fillRect(wx, wy, 6, 8);
          }
        }
      }
      ctx.fillStyle = theme.farMountain;
    });
    ctx.fillStyle = theme.nearMountain;
    mountains2.forEach(m => {
      const bw = m.w * 0.5;
      const bh = m.h * 1.5;
      ctx.fillRect(m.x, ROAD_Y - bh, bw, bh);
      ctx.fillStyle = '#AACCFF';
      for (let wy = ROAD_Y - bh + 6; wy < ROAD_Y - 8; wy += 12) {
        for (let wx = m.x + 5; wx < m.x + bw - 5; wx += 10) {
          if (Math.random() > 0.4) {
            ctx.fillRect(wx, wy, 5, 6);
          }
        }
      }
      ctx.fillStyle = theme.nearMountain;
    });
    return;
  }

  if (currentTheme === 'racetrack') {
    // Draw grandstands
    ctx.fillStyle = '#888899';
    mountains1.forEach(m => {
      const sw = m.w * 0.6;
      const sh = m.h * 0.5;
      ctx.fillRect(m.x, ROAD_Y - sh, sw, sh);
      // Rows of seats
      for (let row = 0; row < 3; row++) {
        const rowY = ROAD_Y - sh + row * (sh / 3);
        for (let s = 0; s < 6; s++) {
          const colors = ['#FF0000', '#0000FF', '#FFFF00', '#00FF00', '#FF8800', '#FF00FF'];
          ctx.fillStyle = colors[(s + row) % colors.length];
          ctx.fillRect(m.x + 5 + s * (sw / 6), rowY + 3, sw / 7, sh / 4);
        }
      }
    });
    // Safety barriers
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(0, ROAD_Y - 8, 900, 4);
    ctx.fillStyle = '#FFFFFF';
    for (let bx = 0; bx < 900; bx += 30) {
      ctx.fillRect(bx, ROAD_Y - 8, 15, 4);
    }
    return;
  }

  // Default mountains (mountain, desert, swamp)
  ctx.fillStyle = theme.farMountain;
  mountains1.forEach(m => {
    ctx.beginPath();
    ctx.moveTo(m.x, ROAD_Y);
    ctx.lineTo(m.x + m.w / 2, ROAD_Y - m.h);
    ctx.lineTo(m.x + m.w, ROAD_Y);
    ctx.fill();
  });
  if (currentTheme === 'mountain') {
    ctx.fillStyle = theme.snowCap;
    mountains1.forEach(m => {
      ctx.beginPath();
      const peakX = m.x + m.w / 2;
      const peakY = ROAD_Y - m.h;
      ctx.moveTo(peakX, peakY);
      ctx.lineTo(peakX - 20, peakY + 20);
      ctx.lineTo(peakX + 20, peakY + 20);
      ctx.fill();
    });
  }
  ctx.fillStyle = theme.nearMountain;
  mountains2.forEach(m => {
    ctx.beginPath();
    ctx.moveTo(m.x, ROAD_Y);
    ctx.lineTo(m.x + m.w / 2, ROAD_Y - m.h);
    ctx.lineTo(m.x + m.w, ROAD_Y);
    ctx.fill();
  });
}

function drawTrees() {
  if (currentTheme === 'city') {
    // Street lights
    trees.forEach(t => {
      const baseY = ROAD_Y - 2;
      ctx.fillStyle = '#666';
      ctx.fillRect(t.x + 5, baseY - t.h, 3, t.h);
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.arc(t.x + 6, baseY - t.h - 3, 5, 0, Math.PI * 2);
      ctx.fill();
    });
    return;
  }

  if (currentTheme === 'desert') {
    // Cacti
    trees.forEach(t => {
      const baseY = ROAD_Y - 2;
      ctx.fillStyle = '#2E8B57';
      ctx.fillRect(t.x + 5, baseY - t.h * 0.7, 6, t.h * 0.7);
      // Arms
      ctx.fillRect(t.x + 11, baseY - t.h * 0.5, 10, 4);
      ctx.fillRect(t.x + 17, baseY - t.h * 0.5, 4, -12);
      ctx.fillRect(t.x - 1, baseY - t.h * 0.35, -8, 4);
      ctx.fillRect(t.x - 5, baseY - t.h * 0.35, 4, -10);
    });
    return;
  }

  if (currentTheme === 'ocean') {
    // No trees on open ocean
    return;
  }

  if (currentTheme === 'swamp') {
    // Dead trees and fog
    trees.forEach(t => {
      const baseY = ROAD_Y - 2;
      ctx.fillStyle = '#3a2a1a';
      ctx.fillRect(t.x + 4, baseY - t.h * 0.6, 5, t.h * 0.6);
      // Dead branches
      ctx.strokeStyle = '#3a2a1a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t.x + 6, baseY - t.h * 0.4);
      ctx.lineTo(t.x + 18, baseY - t.h * 0.55);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(t.x + 6, baseY - t.h * 0.5);
      ctx.lineTo(t.x - 6, baseY - t.h * 0.65);
      ctx.stroke();
    });
    // Fog
    ctx.fillStyle = 'rgba(100,120,80,0.15)';
    ctx.fillRect(0, ROAD_Y - 40, 900, 40);
    return;
  }

  if (currentTheme === 'racetrack') {
    // Flags
    trees.forEach(t => {
      const baseY = ROAD_Y - 2;
      ctx.fillStyle = '#888';
      ctx.fillRect(t.x + 5, baseY - t.h * 0.8, 3, t.h * 0.8);
      // Checkered flag
      const flagW = 16, flagH = 10;
      const fx = t.x + 8, fy = baseY - t.h * 0.8;
      for (let r = 0; r < 2; r++) {
        for (let c = 0; c < 4; c++) {
          ctx.fillStyle = (r + c) % 2 === 0 ? '#000' : '#FFF';
          ctx.fillRect(fx + c * 4, fy + r * 5, 4, 5);
        }
      }
    });
    return;
  }

  // Mountain trees (default)
  trees.forEach(t => {
    const baseY = ROAD_Y - 2;
    ctx.fillStyle = '#5D4037';
    ctx.fillRect(t.x + 4, baseY - t.h * 0.4, 6, t.h * 0.4);
    ctx.fillStyle = t.type === 0 ? '#2E7D32' : t.type === 1 ? '#388E3C' : '#1B5E20';
    ctx.beginPath();
    ctx.moveTo(t.x + 7, baseY - t.h);
    ctx.lineTo(t.x - 5, baseY - t.h * 0.3);
    ctx.lineTo(t.x + 19, baseY - t.h * 0.3);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(t.x + 7, baseY - t.h * 0.7);
    ctx.lineTo(t.x - 8, baseY - t.h * 0.1);
    ctx.lineTo(t.x + 22, baseY - t.h * 0.1);
    ctx.fill();
  });
}

function drawRoad() {
  const theme = THEMES[currentTheme];
  const laneColors = theme.laneColors;

  for (let i = 0; i < 3; i++) {
    const laneY = ROAD_Y + i * LANE_H;
    ctx.fillStyle = laneColors[i];
    ctx.fillRect(0, laneY, 900, LANE_H);

    if (i === jeep.lane && state === STATE.PLAYING) {
      ctx.fillStyle = LANE_HIGHLIGHT;
      ctx.fillRect(0, laneY, 900, LANE_H);
      ctx.fillStyle = 'rgba(255, 215, 0, 0.35)';
      const arrowX = 10;
      const arrowCenterY = laneY + LANE_H / 2;
      ctx.beginPath();
      ctx.moveTo(arrowX + 15, arrowCenterY - 8);
      ctx.lineTo(arrowX + 25, arrowCenterY);
      ctx.lineTo(arrowX + 15, arrowCenterY + 8);
      ctx.fill();
    }
  }

  // Road edges
  ctx.fillStyle = theme.roadEdge;
  ctx.fillRect(0, ROAD_Y, 900, 3);
  ctx.fillRect(0, ROAD_Y + ROAD_H - 3, 900, 3);

  // Lane dividers
  if (currentTheme === 'ocean') {
    // Wave foam dividers
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.setLineDash([30, 20]);
  } else if (currentTheme === 'racetrack') {
    // Solid white lines
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 3;
    ctx.setLineDash([]);
  } else {
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 15]);
  }
  for (let i = 1; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(0, ROAD_Y + i * LANE_H);
    ctx.lineTo(900, ROAD_Y + i * LANE_H);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Ocean: add wave shimmer on road
  if (currentTheme === 'ocean') {
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      for (let wx = 0; wx < 900; wx += 5) {
        const wy = ROAD_Y + 20 + i * 35 + Math.sin((wx + frameCount * 2) * 0.06) * 4;
        if (wx === 0) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
      }
      ctx.stroke();
    }
  }

  // Swamp: add fog/bubbles on road
  if (currentTheme === 'swamp') {
    ctx.fillStyle = 'rgba(80,100,40,0.15)';
    ctx.fillRect(0, ROAD_Y, 900, ROAD_H);
    // Bubbles
    if (frameCount % 10 === 0) {
      ctx.fillStyle = 'rgba(100,130,50,0.3)';
      for (let i = 0; i < 3; i++) {
        const bx = Math.random() * 900;
        const by = ROAD_Y + Math.random() * ROAD_H;
        ctx.beginPath();
        ctx.arc(bx, by, 3 + Math.random() * 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Racetrack: curb markings
  if (currentTheme === 'racetrack') {
    for (let cx = 0; cx < 900; cx += 20) {
      ctx.fillStyle = ((cx / 20) % 2 === 0) ? '#FF0000' : '#FFFFFF';
      ctx.fillRect(cx, ROAD_Y, 10, 3);
      ctx.fillRect(cx, ROAD_Y + ROAD_H - 3, 10, 3);
    }
  }

  // Below road
  const belowGrad = ctx.createLinearGradient(0, ROAD_Y + ROAD_H, 0, 580);
  belowGrad.addColorStop(0, theme.belowRoad[0]);
  belowGrad.addColorStop(1, theme.belowRoad[1]);
  ctx.fillStyle = belowGrad;
  ctx.fillRect(0, ROAD_Y + ROAD_H, 900, 580 - ROAD_Y - ROAD_H);
}

function drawObstacle(obs) {
  ctx.save();
  switch (obs.type) {
    case 'ROCK':
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2 + 5, obs.w/2, obs.h/2.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#999';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 - 3, obs.y + obs.h/2, obs.w/2.5, obs.h/3, -0.2, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'BOULDER':
      ctx.fillStyle = '#666';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 - 5, obs.y + obs.h/2 - 5, obs.w/4, obs.h/4, 0, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'LOG':
      ctx.fillStyle = '#6D4C2B';
      ctx.fillRect(obs.x, obs.y + 2, obs.w, obs.h - 4);
      ctx.fillStyle = '#8B6914';
      ctx.beginPath();
      ctx.ellipse(obs.x, obs.y + obs.h/2, obs.h/2 - 2, obs.h/2 - 2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#5D3A1A';
      ctx.beginPath();
      ctx.arc(obs.x, obs.y + obs.h/2, 5, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'FALLEN_TREE':
      ctx.fillStyle = '#5D4037';
      ctx.save();
      ctx.translate(obs.x + obs.w/2, obs.y + obs.h);
      ctx.rotate(-0.5);
      ctx.fillRect(-obs.w/2, -12, obs.w, 14);
      ctx.restore();
      ctx.fillStyle = '#2E7D32';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w - 10, obs.y + 10, 20, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#388E3C';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w - 5, obs.y + 20, 15, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'WATER':
      ctx.fillStyle = 'rgba(52, 152, 219, 0.5)';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        for (let wx = obs.x; wx < obs.x + obs.w; wx += 5) {
          const wy = obs.y + 20 + i * 30 + Math.sin((wx + frameCount * 3) * 0.08) * 5;
          if (wx === obs.x) ctx.moveTo(wx, wy); else ctx.lineTo(wx, wy);
        }
        ctx.stroke();
      }
      break;

    case 'MUD':
      ctx.fillStyle = 'rgba(139, 105, 20, 0.6)';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = 'rgba(101, 67, 33, 0.5)';
      for (let i = 0; i < 5; i++) {
        const mx = obs.x + 15 + (i * 20) % obs.w;
        const my = obs.y + 15 + (i * 25) % obs.h;
        ctx.beginPath();
        ctx.ellipse(mx, my, 8, 5, i, 0, Math.PI*2);
        ctx.fill();
      }
      break;

    case 'GAP':
      ctx.fillStyle = currentTheme === 'ocean' ? '#0a2a3c' : '#1a1a2e';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = currentTheme === 'ocean' ? '#1a4a5a' : '#3a2a1a';
      ctx.fillRect(obs.x - 3, obs.y, 6, obs.h);
      ctx.fillRect(obs.x + obs.w - 3, obs.y, 6, obs.h);
      const gapGrad = ctx.createLinearGradient(obs.x, obs.y, obs.x, obs.y + obs.h);
      gapGrad.addColorStop(0, 'rgba(0,0,0,0)');
      gapGrad.addColorStop(1, 'rgba(0,0,0,0.8)');
      ctx.fillStyle = gapGrad;
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      break;

    case 'ICE':
      ctx.fillStyle = 'rgba(168, 216, 234, 0.5)';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let i = 0; i < 4; i++) {
        ctx.fillRect(obs.x + 10 + i * 25, obs.y + 10 + (i % 2) * 40, 15, 3);
      }
      break;

    case 'RAMP':
      ctx.fillStyle = '#FF8C00';
      ctx.beginPath();
      ctx.moveTo(obs.x, obs.y + obs.h);
      ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
      ctx.lineTo(obs.x + obs.w, obs.y);
      ctx.fill();
      ctx.fillStyle = '#CC7000';
      ctx.beginPath();
      ctx.moveTo(obs.x, obs.y + obs.h);
      ctx.lineTo(obs.x + obs.w * 0.7, obs.y + obs.h);
      ctx.lineTo(obs.x + obs.w, obs.y + obs.h * 0.3);
      ctx.lineTo(obs.x + obs.w, obs.y);
      ctx.fill();
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < 3; i++) {
        const sx = obs.x + 5 + i * 15;
        ctx.fillRect(sx, obs.y + obs.h - 8, 8, 3);
      }
      break;

    case 'MELTED_LOLLY':
      ctx.fillStyle = 'rgba(255, 105, 180, 0.6)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h/2.5, 0.1, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(220, 60, 120, 0.5)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 - 5, obs.y + obs.h/2, obs.w/4, obs.h/3.5, -0.2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#D2B48C';
      ctx.save();
      ctx.translate(obs.x + obs.w/2 + 8, obs.y + obs.h/2 - 2);
      ctx.rotate(0.4);
      ctx.fillRect(-2, -12, 4, 18);
      ctx.restore();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2 - 8, obs.y + obs.h/2 - 3, 3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 105, 180, 0.3)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 + 15, obs.y + obs.h/2 + 5, 6, 3, 0.5, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'SMOOTHIE':
      ctx.fillStyle = 'rgba(155, 89, 182, 0.55)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h/2.2, -0.15, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(120, 40, 140, 0.5)';
      for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.arc(obs.x + 10 + i * 12, obs.y + obs.h/2 + (i%2 ? 3 : -3), 3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle = 'rgba(100, 180, 60, 0.5)';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2 + 5, obs.y + obs.h/2 - 2, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200, 200, 200, 0.7)';
      ctx.save();
      ctx.translate(obs.x + obs.w/2 - 10, obs.y + obs.h/2);
      ctx.rotate(-1.2);
      ctx.fillRect(-5, -10, 10, 16);
      ctx.restore();
      ctx.strokeStyle = '#E74C3C';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(obs.x + obs.w/2 - 12, obs.y + obs.h/2 - 8);
      ctx.lineTo(obs.x + obs.w/2 - 18, obs.y + obs.h/2 - 18);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 + 8, obs.y + obs.h/2 - 4, 5, 2, 0, 0, Math.PI*2);
      ctx.fill();
      break;

    // City obstacles
    case 'POTHOLE':
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h/2.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2 + 2, obs.w/3, obs.h/3.5, 0, 0, Math.PI*2);
      ctx.fill();
      break;

    case 'CONE':
      ctx.fillStyle = '#FF6600';
      ctx.beginPath();
      ctx.moveTo(obs.x + obs.w/2, obs.y);
      ctx.lineTo(obs.x + obs.w - 3, obs.y + obs.h);
      ctx.lineTo(obs.x + 3, obs.y + obs.h);
      ctx.fill();
      // White stripes
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(obs.x + 6, obs.y + obs.h * 0.4, obs.w - 12, 4);
      ctx.fillRect(obs.x + 8, obs.y + obs.h * 0.65, obs.w - 16, 3);
      // Base
      ctx.fillStyle = '#FF4400';
      ctx.fillRect(obs.x, obs.y + obs.h - 5, obs.w, 5);
      break;

    // Desert obstacles
    case 'CACTUS':
      ctx.fillStyle = '#2E8B57';
      // Main trunk
      ctx.fillRect(obs.x + obs.w/2 - 5, obs.y + 5, 10, obs.h - 5);
      // Arms
      ctx.fillRect(obs.x + obs.w/2 + 5, obs.y + 15, 12, 5);
      ctx.fillRect(obs.x + obs.w/2 + 12, obs.y + 5, 5, 15);
      ctx.fillRect(obs.x + obs.w/2 - 17, obs.y + 20, 12, 5);
      ctx.fillRect(obs.x + obs.w/2 - 17, obs.y + 12, 5, 13);
      // Spines
      ctx.fillStyle = '#90EE90';
      for (let i = 0; i < 5; i++) {
        ctx.fillRect(obs.x + obs.w/2 - 6, obs.y + 8 + i * 8, 1, 3);
        ctx.fillRect(obs.x + obs.w/2 + 5, obs.y + 10 + i * 7, 1, 3);
      }
      break;

    case 'TUMBLEWEED':
      ctx.fillStyle = '#C4A35A';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2.2, 0, Math.PI*2);
      ctx.fill();
      // Tangled lines
      ctx.strokeStyle = '#8B7332';
      ctx.lineWidth = 1;
      for (let i = 0; i < 6; i++) {
        const a = (frameCount * 0.02 + i) * 1.1;
        ctx.beginPath();
        ctx.arc(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/3, a, a + 1.5);
        ctx.stroke();
      }
      ctx.fillStyle = '#B89940';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/3.5, 0, Math.PI*2);
      ctx.fill();
      break;

    // Ocean obstacles (islands with palm trees)
    case 'ISLAND':
      // Sand island
      ctx.fillStyle = '#D4A45A';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h - 5, obs.w/2, obs.h/3, 0, 0, Math.PI*2);
      ctx.fill();
      // Lighter sand
      ctx.fillStyle = '#E8C87A';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h - 8, obs.w/3, obs.h/5, 0, 0, Math.PI*2);
      ctx.fill();
      // Palm tree trunk
      ctx.strokeStyle = '#8B6914';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(obs.x + obs.w/2, obs.y + obs.h - 10);
      ctx.quadraticCurveTo(obs.x + obs.w/2 + 8, obs.y + obs.h/2, obs.x + obs.w/2 + 5, obs.y + 8);
      ctx.stroke();
      // Palm leaves
      ctx.fillStyle = '#228B22';
      const palmTop = obs.y + 5;
      const palmCx = obs.x + obs.w/2 + 5;
      for (let a = 0; a < 5; a++) {
        const angle = (a / 5) * Math.PI * 2 + 0.3;
        ctx.beginPath();
        ctx.ellipse(palmCx + Math.cos(angle) * 12, palmTop + Math.sin(angle) * 6, 14, 4, angle, 0, Math.PI * 2);
        ctx.fill();
      }
      // Coconuts
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.arc(palmCx - 3, palmTop + 4, 3, 0, Math.PI*2);
      ctx.arc(palmCx + 4, palmTop + 5, 3, 0, Math.PI*2);
      ctx.fill();
      break;

    // Swamp obstacles (bones)
    case 'BONE_PILE':
      ctx.fillStyle = '#E8DCC8';
      // Scattered bones
      ctx.save();
      ctx.translate(obs.x + obs.w/2, obs.y + obs.h/2);
      for (let i = 0; i < 4; i++) {
        ctx.save();
        ctx.rotate(i * 0.8 + 0.3);
        // Bone shape
        ctx.fillRect(-12, -2, 24, 4);
        ctx.beginPath();
        ctx.arc(-12, 0, 4, 0, Math.PI*2);
        ctx.arc(12, 0, 4, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
      break;

    case 'SKULL':
      ctx.fillStyle = '#F0E6D3';
      // Skull shape
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2, obs.y + obs.h/2 - 3, obs.w/2.5, 0, Math.PI*2);
      ctx.fill();
      // Jaw
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2 + 8, obs.w/3.5, 6, 0, 0, Math.PI);
      ctx.fill();
      // Eyes
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath();
      ctx.arc(obs.x + obs.w/2 - 6, obs.y + obs.h/2 - 5, 4, 0, Math.PI*2);
      ctx.arc(obs.x + obs.w/2 + 6, obs.y + obs.h/2 - 5, 4, 0, Math.PI*2);
      ctx.fill();
      // Nose
      ctx.beginPath();
      ctx.moveTo(obs.x + obs.w/2 - 2, obs.y + obs.h/2 + 1);
      ctx.lineTo(obs.x + obs.w/2 + 2, obs.y + obs.h/2 + 1);
      ctx.lineTo(obs.x + obs.w/2, obs.y + obs.h/2 + 5);
      ctx.fill();
      // Teeth
      ctx.fillStyle = '#F0E6D3';
      for (let t = -2; t <= 2; t++) {
        ctx.fillRect(obs.x + obs.w/2 + t * 4 - 1, obs.y + obs.h/2 + 8, 3, 4);
      }
      break;

    // Racetrack obstacles
    case 'TIRE_WALL':
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 3; col++) {
          ctx.fillStyle = '#222';
          ctx.beginPath();
          ctx.arc(obs.x + 8 + col * 14, obs.y + 10 + row * 16, 7, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#444';
          ctx.beginPath();
          ctx.arc(obs.x + 8 + col * 14, obs.y + 10 + row * 16, 3, 0, Math.PI*2);
          ctx.fill();
        }
      }
      break;

    case 'OIL_SPILL':
      ctx.fillStyle = 'rgba(20,20,30,0.7)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2, obs.y + obs.h/2, obs.w/2, obs.h/2, 0, 0, Math.PI*2);
      ctx.fill();
      // Rainbow sheen
      ctx.fillStyle = 'rgba(100,50,150,0.2)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 - 5, obs.y + obs.h/2 - 2, obs.w/3, obs.h/3, 0.3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(50,150,100,0.15)';
      ctx.beginPath();
      ctx.ellipse(obs.x + obs.w/2 + 8, obs.y + obs.h/2 + 1, obs.w/4, obs.h/4, -0.2, 0, Math.PI*2);
      ctx.fill();
      break;
  }
  ctx.restore();
}

// ============ VEHICLE DRAWING ============

function drawJeep() {
  ctx.save();
  const jx = jeep.x;
  const jy = jeep.y;

  if (jeep.invincible > 0 && Math.floor(frameCount / 4) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  ctx.translate(jx + jeep.w/2, jy + jeep.h/2);
  ctx.rotate(jeep.tilt);
  ctx.translate(-jeep.w/2, -jeep.h/2);

  if (currentTheme === 'ocean') {
    drawShip();
  } else if (currentTheme === 'swamp') {
    drawMotorbike();
  } else if (currentTheme === 'racetrack') {
    drawF1Car();
  } else {
    drawJeepVehicle();
  }

  ctx.restore();
}

function drawJeepVehicle() {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(jeep.w/2, jeep.h + 5, jeep.w/2 - 5, 6, 0, 0, Math.PI*2);
  ctx.fill();
  // Body
  ctx.fillStyle = '#2E7D32';
  ctx.fillRect(5, 15, 60, 22);
  ctx.fillStyle = '#388E3C';
  ctx.fillRect(20, 4, 35, 16);
  ctx.fillStyle = '#1B5E20';
  ctx.fillRect(22, 2, 31, 5);
  // Windshield
  ctx.fillStyle = 'rgba(135,206,250,0.7)';
  ctx.beginPath();
  ctx.moveTo(52, 5);
  ctx.lineTo(57, 15);
  ctx.lineTo(52, 15);
  ctx.fill();
  // Rear window
  ctx.fillStyle = 'rgba(135,206,250,0.5)';
  ctx.fillRect(22, 6, 8, 10);
  // Bumpers
  ctx.fillStyle = '#444';
  ctx.fillRect(0, 20, 8, 12);
  ctx.fillRect(62, 20, 8, 12);
  // Lights
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(63, 22, 5, 5);
  ctx.fillStyle = '#FF0000';
  ctx.fillRect(2, 22, 4, 4);
  // Spare tire
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(5, 14, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#555';
  ctx.beginPath();
  ctx.arc(5, 14, 3, 0, Math.PI*2);
  ctx.fill();
  // Wheels
  jeep.wheelAngle += speed * 0.15;
  const drawWheel = (wx, wy) => {
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(wx, wy, 9, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(wx, wy, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    for (let s = 0; s < 4; s++) {
      const angle = jeep.wheelAngle + s * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(wx, wy);
      ctx.lineTo(wx + Math.cos(angle) * 7, wy + Math.sin(angle) * 7);
      ctx.stroke();
    }
  };
  drawWheel(17, 40);
  drawWheel(53, 40);
  // Snorkel
  ctx.fillStyle = '#555';
  ctx.fillRect(55, 0, 3, 8);
}

function drawParticles() {
  dustParticles.forEach(p => {
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  splashParticles.forEach(p => {
    ctx.fillStyle = `rgba(52,152,219,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  particles.forEach(p => {
    ctx.fillStyle = `rgba(255,${p.g},0,${p.alpha})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawLives() {
  let livesStr = '';
  for (let i = 0; i < jeep.maxLives; i++) {
    livesStr += i < jeep.lives ? '❤️' : '🖤';
  }
  hudLives.textContent = livesStr;
  ctx.font = '24px sans-serif';
  for (let i = 0; i < jeep.maxLives; i++) {
    ctx.fillText(i < jeep.lives ? '❤️' : '🖤', 20 + i * 30, 565);
  }
  // Turbo gauge
  const gaugeX = 130;
  const gaugeY = 553;
  const gaugeW = 100;
  const gaugeH = 10;
  const fuel = jeep.turboFuel / 100;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(gaugeX, gaugeY, gaugeW, gaugeH);
  const turboColor = fuel > 0.3 ? '#FF8C00' : '#FF3333';
  ctx.fillStyle = jeep.turbo ? '#FFAA00' : turboColor;
  ctx.fillRect(gaugeX, gaugeY, gaugeW * fuel, gaugeH);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(gaugeX, gaugeY, gaugeW, gaugeH);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillText('TURBO', gaugeX + gaugeW + 6, gaugeY + 9);
}

function drawWarning(text) {

// ============ UPDATE FUNCTIONS ============

function updateParallax() {
  mountains1.forEach(m => {
    m.x -= speed * 0.3;
    if (m.x + m.w < -50) m.x = 900 + Math.random() * 100;
  });
  mountains2.forEach(m => {
    m.x -= speed * 0.6;
    if (m.x + m.w < -50) m.x = 900 + Math.random() * 100;
  });
  clouds.forEach(c => {
    c.x -= speed * 0.15;
    if (c.x + c.w < -50) { c.x = 950; c.y = 30 + Math.random() * 60; }
  });
  trees.forEach(t => {
    t.x -= speed * 0.8;
    if (t.x < -30) { t.x = 920 + Math.random() * 100; t.h = 30 + Math.random() * 25; }
  });
}

function updateJeep() {
  const targetY = ROAD_Y + jeep.lane * LANE_H + (LANE_H - jeep.h) / 2;
  const isSlippery = jeep.onIce || jeep.onMud || jeep.onSlippery;

  if (keys['ArrowLeft'] && jeep.grounded && !jeep.laneKeyHeld) {
    if (isSlippery) {
      const slip = Math.random();
      if (slip < 0.3 && jeep.lane > 1) {
        jeep.lane -= 2;
      } else if (slip < 0.5) {
        // slip
      } else if (jeep.lane > 0) {
        jeep.lane--;
      }
    } else if (jeep.lane > 0) {
      jeep.lane--;
    }
    jeep.laneKeyHeld = true;
    playLaneSound();
  }
  if (keys['ArrowRight'] && jeep.grounded && !jeep.laneKeyHeld) {
    if (isSlippery) {
      const slip = Math.random();
      if (slip < 0.3 && jeep.lane < 1) {
        jeep.lane += 2;
      } else if (slip < 0.5) {
        // slip
      } else if (jeep.lane < 2) {
        jeep.lane++;
      }
    } else if (jeep.lane < 2) {
      jeep.lane++;
    }
    jeep.laneKeyHeld = true;
    playLaneSound();
  }
  if (!keys['ArrowLeft'] && !keys['ArrowRight']) {
    jeep.laneKeyHeld = false;
  }

  if (keys['ArrowUp'] && jeep.grounded) {
    jeep.vy = -10;
    jeep.grounded = false;
    jeep.tilt = -0.15;
    keys['ArrowUp'] = false;
    playJumpSound();
  }
  if (keys[' '] && jeep.grounded) {
    jeep.vy = -10;
    jeep.grounded = false;
    jeep.tilt = -0.15;
    keys[' '] = false;
    playJumpSound();
  }

  if (keys['ArrowDown'] && jeep.turboFuel > 0) {
    jeep.turbo = true;
    jeep.turboFuel = Math.max(0, jeep.turboFuel - 0.8);
    speed = Math.min(baseSpeed * 2, speed + 0.3);
    startTurboSound();
    if (frameCount % 2 === 0) {
      for (let i = 0; i < 3; i++) {
        dustParticles.push({
          x: jeep.x - 2,
          y: jeep.y + 25 + (Math.random() - 0.5) * 10,
          vx: -3 - Math.random() * 4,
          vy: (Math.random() - 0.5) * 2,
          size: 3 + Math.random() * 4,
          alpha: 0.9,
          r: 255, g: Math.floor(100 + Math.random() * 100), b: 0,
        });
      }
    }
  } else {
    if (jeep.turbo) stopTurboSound();
    jeep.turbo = false;
    speed += (baseSpeed - speed) * 0.02;
    if (jeep.turboFuel < 100) jeep.turboFuel += 0.2;
  }

  if (!jeep.grounded) {
    jeep.vy += 0.5;
    jeep.y += jeep.vy;
    jeep.tilt = jeep.vy * 0.02;
    if (jeep.y >= jeep.groundY) {
      jeep.y = jeep.groundY;
      jeep.vy = 0;
      jeep.grounded = true;
      jeep.tilt = 0;
      for (let i = 0; i < 6; i++) {
        dustParticles.push({
          x: jeep.x + 15 + Math.random() * 40,
          y: jeep.y + jeep.h,
          vx: (Math.random() - 0.5) * 3,
          vy: -Math.random() * 2,
          size: 2 + Math.random() * 3,
          alpha: 0.7,
          r: 150, g: 130, b: 100,
        });
      }
    }
  } else {
    const laneSpeed = jeep.onIce ? 0.06 : ((jeep.onMud || jeep.onSlippery) ? 0.08 : 0.15);
    const diff = targetY - jeep.y;
    jeep.y += diff * laneSpeed;
    jeep.groundY = jeep.y;

    if (jeep.onIce && frameCount % 30 === 0 && Math.random() < 0.4) {
      const drift = Math.random() < 0.5 ? -1 : 1;
      jeep.lane = Math.max(0, Math.min(2, jeep.lane + drift));
    }
    if (jeep.onMud && frameCount % 40 === 0 && Math.random() < 0.3) {
      const drift = Math.random() < 0.5 ? -1 : 1;
      jeep.lane = Math.max(0, Math.min(2, jeep.lane + drift));
    }
    if (jeep.onSlippery && frameCount % 25 === 0 && Math.random() < 0.35) {
      const drift = Math.random() < 0.5 ? -1 : 1;
      jeep.lane = Math.max(0, Math.min(2, jeep.lane + drift));
    }
  }

  if (jeep.inWater) {
    speed = Math.max(baseSpeed * 0.4, speed - 0.05);
    if (frameCount % 3 === 0) {
      splashParticles.push({
        x: jeep.x + 60 + Math.random() * 10,
        y: jeep.y + jeep.h - 5,
        vx: 1 + Math.random() * 2,
        vy: -2 - Math.random() * 4,
        size: 2 + Math.random() * 2,
        alpha: 0.8,
      });
    }
  }

  if (jeep.onMud) {
    speed = Math.max(baseSpeed * 0.5, speed - 0.04);
    for (let i = 0; i < 3; i++) {
      dustParticles.push({
        x: jeep.x + 10 + Math.random() * 15,
        y: jeep.y + jeep.h - 5,
        vx: -2 - Math.random() * 4,
        vy: -1 - Math.random() * 5,
        size: 3 + Math.random() * 5,
        alpha: 0.7 + Math.random() * 0.3,
        r: 100 + Math.floor(Math.random() * 40),
        g: 60 + Math.floor(Math.random() * 30),
        b: 10 + Math.floor(Math.random() * 20),
      });
    }
    if (frameCount % 2 === 0) {
      for (let i = 0; i < 2; i++) {
        dustParticles.push({
          x: jeep.x + 50 + Math.random() * 10,
          y: jeep.y + jeep.h - 3,
          vx: 1 + Math.random() * 3,
          vy: -3 - Math.random() * 6,
          size: 4 + Math.random() * 6,
          alpha: 0.8,
          r: 80 + Math.floor(Math.random() * 30),
          g: 50 + Math.floor(Math.random() * 20),
          b: 5 + Math.floor(Math.random() * 15),
        });
      }
    }
    if (frameCount % 3 === 0) {
      dustParticles.push({
        x: jeep.x + 20 + Math.random() * 30,
        y: jeep.y + Math.random() * jeep.h,
        vx: (Math.random() - 0.5) * 6,
        vy: -2 - Math.random() * 3,
        size: 2 + Math.random() * 4,
        alpha: 0.6,
        r: 110, g: 75, b: 20,
      });
    }
  }

  if (jeep.onIce) {
    if (jeep.turbo) {
      speed = Math.min(baseSpeed * 1.3, speed);
    }
    for (let i = 0; i < 2; i++) {
      dustParticles.push({
        x: jeep.x + 5 + Math.random() * 15,
        y: jeep.y + jeep.h - 2,
        vx: -1 - Math.random() * 3,
        vy: -1 - Math.random() * 3,
        size: 2 + Math.random() * 3,
        alpha: 0.6 + Math.random() * 0.4,
        r: 220 + Math.floor(Math.random() * 35),
        g: 230 + Math.floor(Math.random() * 25),
        b: 245 + Math.floor(Math.random() * 10),
      });
    }
    if (frameCount % 2 === 0) {
      for (let i = 0; i < 3; i++) {
        dustParticles.push({
          x: Math.random() * 900,
          y: ROAD_Y - 10 - Math.random() * 20,
          vx: -speed * 0.3 + (Math.random() - 0.5) * 2,
          vy: 1 + Math.random() * 2,
          size: 1.5 + Math.random() * 3,
          alpha: 0.5 + Math.random() * 0.5,
          r: 230 + Math.floor(Math.random() * 25),
          g: 235 + Math.floor(Math.random() * 20),
          b: 250,
        });
      }
    }
  }

  if (jeep.onSlippery && frameCount % 4 === 0) {
    dustParticles.push({
      x: jeep.x + 10 + Math.random() * 15,
      y: jeep.y + jeep.h - 2,
      vx: -1 - Math.random() * 2,
      vy: -1 - Math.random() * 2,
      size: 2 + Math.random() * 3,
      alpha: 0.5,
      r: 200 + Math.floor(Math.random() * 55),
      g: 80 + Math.floor(Math.random() * 60),
      b: 150 + Math.floor(Math.random() * 60),
    });
  }

  if (jeep.grounded && frameCount % 5 === 0 && !jeep.inWater && !jeep.onMud) {
    dustParticles.push({
      x: jeep.x + 5,
      y: jeep.y + jeep.h,
      vx: -1 - Math.random(),
      vy: -Math.random(),
      size: 2 + Math.random() * 2,
      alpha: 0.4,
      r: 150, g: 140, b: 120,
    });
  }

  if (jeep.invincible > 0) jeep.invincible--;

  jeep.inWater = false;
  jeep.onMud = false;
  jeep.onIce = false;
  jeep.onSlippery = false;

  updateEngineSound();
}

function updateObstacles() {
  // Wider gaps for easier jumping
  const minGap = Math.max(280, 450 - level * 8);
  const maxGap = Math.max(380, 600 - level * 10);
  if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < 900 - minGap - Math.random() * (maxGap - minGap)) {
    spawnObstacle();
  }

  obstacles.forEach(obs => {
    obs.x -= speed;
  });

  obstacles = obstacles.filter(o => o.x + o.w > -50);
}

function checkCollisions() {
  const jx = jeep.x + 10;
  const jy = jeep.y + 5;
  const jw = jeep.w - 20;
  const jh = jeep.h - 10;

  obstacles.forEach(obs => {
    const overlapX = jx < obs.x + obs.w && jx + jw > obs.x;
    const overlapY = jy < obs.y + obs.h && jy + jh > obs.y;

    if (obs.fullWidth && overlapX) {
      switch (obs.type) {
        case 'WATER':
          jeep.inWater = true;
          break;
        case 'MUD':
          jeep.onMud = true;
          speed = Math.max(baseSpeed * 0.6, speed - 0.03);
          break;
        case 'ICE':
          jeep.onIce = true;
          break;
        case 'GAP':
          if (jeep.grounded && overlapY) {
            hit(true);
          }
          break;
      }
    } else if (obs.slippery && overlapX && overlapY) {
      if (!obs.passed) {
        jeep.onSlippery = true;
        obs.passed = true;
      }
      jeep.onSlippery = true;
    } else if (!obs.fullWidth && !obs.slippery && overlapX && overlapY) {
      if (obs.isRamp && jeep.grounded) {
        jeep.vy = -12;
        jeep.grounded = false;
        jeep.tilt = -0.2;
        obs.passed = true;
      } else if (!obs.passed && !obs.isRamp) {
        if (!jeep.grounded && jeep.y + jeep.h < obs.y + obs.h * 0.5) {
          obs.passed = true;
          return;
        }
        hit(false);
        obs.passed = true;
      }
    }
  });
}

function hit(deadly) {
  if (jeep.invincible > 0) return;
  if (deadly) {
    jeep.lives = 0;
  } else {
    jeep.lives--;
  }
  jeep.invincible = 60;
  shakeTimer = 15;
  shakeIntensity = deadly ? 8 : 4;
  playCrashSound();
  for (let i = 0; i < 10; i++) {
    particles.push({
      x: jeep.x + jeep.w / 2,
      y: jeep.y + jeep.h / 2,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      size: 2 + Math.random() * 4,
      alpha: 1,
      g: Math.floor(Math.random() * 200),
    });
  }
  if (jeep.lives <= 0) gameOver();
}

function updateParticles() {
  dustParticles.forEach(p => {
    p.x += p.vx - speed * 0.5;
    p.y += p.vy;
    p.alpha -= 0.015;
    p.size *= 1.01;
  });
  dustParticles = dustParticles.filter(p => p.alpha > 0);

  splashParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.alpha -= 0.02;
  });
  splashParticles = splashParticles.filter(p => p.alpha > 0);

  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.025;
  });
  particles = particles.filter(p => p.alpha > 0);
}

function updateDifficulty() {
  score = Math.floor(frameCount * speed * 0.15);
  const newLevel = Math.floor(score / 300) + 1;
  if (newLevel > level && newLevel <= 30) {
    level = newLevel;
    baseSpeed = 3 + (level - 1) * 0.35;
  }
  baseSpeed += 0.0003;

  // Update theme
  const newTheme = getTheme();
  if (newTheme !== currentTheme) {
    currentTheme = newTheme;
    // Clear obstacles for clean theme transition
    obstacles = [];
  }

  hudScore.textContent = `Vzdálenost: ${score} m`;
  hudSpeed.textContent = `Rychlost: ${Math.floor(60 + (speed - 3) * 15)} km/h`;
  hudLevel.textContent = `Úroveň: ${level}`;
}

// Main loop
function update() {
  if (state !== STATE.PLAYING) return;
  frameCount++;
  updateParallax();
  updateJeep();
  updateObstacles();
  checkCollisions();
  updateParticles();
  updateDifficulty();
}

function draw() {
  ctx.save();

  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
    shakeTimer--;
    shakeIntensity *= 0.9;
  }

  drawSky();
  drawClouds();
  drawMountains();
  drawTrees();
  drawRoad();

  obstacles.forEach(obs => drawObstacle(obs));

  if (state === STATE.PLAYING) {
    drawJeep();
    drawParticles();
    drawLives();

    if (jeep.inWater) drawWarning('🌊 BRODĚNÍ');
    else if (jeep.onMud) drawWarning('💩 BLÁTO');
    else if (jeep.onIce) drawWarning('🧊 LED');
    else if (jeep.onSlippery) drawWarning('🍦 KLUZKO!');
    else if (jeep.turbo) drawWarning('🔥 TURBO!');
  }

  ctx.restore();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

initMountains();
gameLoop();
</script>
</body>
